<!DOCTYPE html>
<!--
  =====================================================================
  POST TEMPLATE — not shown anywhere. Copy this to make a new post.
  1. Copy to blog/posts/<your-slug>.html
  2. Update <title>, the <h1>, and the .post-meta date
  3. Write inside <div class="post-body"> ... </div>
  4. Add a <li> to the post list in blog/index.html
  =====================================================================
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post title — Dennis Freyman</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../styles.css" />
</head>
<body>
  <main class="container">

    <a class="back-link" href="../index.html">&larr; all posts</a>

    <article>
      <h1>Post title</h1>
      <p class="post-meta">Month DD, 2026</p>

      <div class="post-body">
        <p>Opening paragraph.</p>

        <h2>A section heading</h2>
        <p>Body text. Links look like <a href="#">this</a>.</p>
        <ul>
          <li>List item one</li>
          <li>List item two</li>
        </ul>

        <p>Inline <code>code</code>, and a block:</p>
        <pre><code>def example():
    return 42</code></pre>
      </div>
    </article>

  </main>
</body>
</html>
